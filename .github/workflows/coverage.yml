# .github/workflows/coverage.yml
# Phase A4 / issue #21: Python coverage for Deduplication Guardian (+ scripts).
# Free ubuntu-latest only. Codecov/Codacy upload when secrets are present.

name: Python Coverage

on:
  push:
    branches: [main]
  pull_request:

jobs:
  coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: Run pytest with coverage
        run: |
          pytest --cov=scripts --cov-report=xml:coverage.xml --cov-report=term

      - name: Upload coverage.xml artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: error

      - name: Upload to Codecov
        if: ${{ secrets.CODECOV_TOKEN != '' }}
        uses: codecov/codecov-action@v5
        with:
          files: coverage.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      # Codacy coverage reporter: prefer project token; fall back to API token.
      # Non-blocking if org secrets are missing on forks.
      - name: Upload to Codacy
        if: ${{ secrets.CODACY_PROJECT_TOKEN != '' || secrets.CODACY_API_TOKEN != '' }}
        env:
          CODACY_PROJECT_TOKEN: ${{ secrets.CODACY_PROJECT_TOKEN }}
          CODACY_API_TOKEN: ${{ secrets.CODACY_API_TOKEN }}
        run: |
          set -euo pipefail
          bash <(curl -Ls https://coverage.codacy.com/get.sh) report \
            --force-coverage-parser cobertura \
            -r coverage.xml \
            || echo "Codacy coverage upload skipped or failed (non-blocking)"
