---
engines:
  pylint:
    enabled: true
    arguments:
      - "--max-line-length=160"
      - "--max-module-lines=150"
      - "--max-complexity=20"
  flake8:
    enabled: true
    arguments:
      - "--max-line-length=160"
  pydocstyle:
    enabled: true
    arguments:
      - "--ignore=D213"
exclude_paths:
  - tests/
  - "**/test_*.py"
