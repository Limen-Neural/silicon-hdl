---
engines:
  pydocstyle:
    enabled: false
  pylint:
    enabled: true
    arguments:
      - "--max-line-length=160"
      - "--max-module-lines=150"
      - "--max-complexity=20"
  flake8:
    enabled: true
    arguments:
      - "--max-line-length=160"
exclude_paths:
  - tests/
  - "**/test_*.py"
  # Agent instruction files — Agentlinter flags dual-license SPDX wording and
  # normal ops guidance as quality-gate failures; keep them out of PR gates.
  - CLAUDE.md
  - AGENTS.md
